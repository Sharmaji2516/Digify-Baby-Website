<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstCry - Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
    <style>
        .checkout-container { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        .checkout-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 30px; }
        @media (max-width: 992px) { .checkout-layout { grid-template-columns: 1fr; } }
        
        .section-card { background: white; padding: 30px; border-radius: 20px; box-shadow: var(--shadow-sm); margin-bottom: 30px; }
        .section-card h2 { font-weight: 900; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .section-card h2 i { color: var(--primary); }
        
        .address-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 20px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; font-size: 14px; }
        .form-group input, .form-group textarea { width:100%; padding:12px; border:2px solid #f0f0f0; border-radius:10px; font-family:inherit; }
        
        .summary-card { background: #fdfdfd; padding: 25px; border-radius: 20px; border: 2px dashed #eee; position: sticky; top: 100px; }
        .item-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; color: #666; gap: 15px; }
        .item-row span:first-child { 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            max-width: 200px; 
            font-weight: 700;
        }
        .total-row { border-top: 2px solid #eee; padding-top: 20px; margin-top: 20px; display: flex; justify-content: space-between; font-weight: 900; font-size: 20px; color: var(--primary); }
        
        .place-order-btn { width: 100%; background: #2ecc71; color: white; border: none; padding: 18px; border-radius: 40px; font-size: 20px; font-weight: 900; margin-top: 25px; cursor: pointer; transition: var(--transition); box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); }
        .place-order-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(46, 204, 113, 0.4); }

        .address-card {
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            background: #fff;
        }
        .address-card:hover {
            border-color: #ddd;
            transform: translateY(-2px);
        }
        .address-card.selected {
            border-color: var(--primary) !important;
            background: #fff9f0;
            box-shadow: 0 5px 15px rgba(255, 144, 43, 0.1);
        }
        .address-card.selected::after {
            content: '\f058';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            top: 10px;
            right: 10px;
            color: var(--primary);
            font-size: 18px;
        }
    </style>
</head>
<body>
    <header class="navbar has-back-btn">
        <!-- New Back Button for Mobile -->
        <button class="mobile-back-btn mobile-only" onclick="history.back()"><i class="fas fa-chevron-left"></i></button>

        <a href="index.html" class="logo" style="text-decoration: none;">
            <span class="first">First</span><span class="cry">Cry</span>
        </a>
        <div style="font-weight: 800; color: #888; display: flex; align-items: center; gap: 8px;" class="desktop-only">
            <i class="fas fa-lock" style="color: #2ecc71;"></i> Secure Checkout
        </div>
        <div class="nav-links desktop-only" style="margin-left: auto;">
             <a href="cart.html"><i class="fas fa-arrow-left"></i> Back to Cart</a>
        </div>
        <div class="nav-links cart-only mobile-only">
             <a href="cart.html" class="cart"><i class="fas fa-shopping-cart"></i> <span id="cartCount" class="badge">0</span></a>
        </div>
    </header>

    <main class="checkout-container">
        <h1 style="font-weight: 900; margin-bottom: 40px;">Checkout 🚀</h1>
        
        <div class="checkout-layout">
            <div class="main-content">
                <!-- Shipping Address -->
                <div class="section-card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                        <h2 style="margin: 0;"><i class="fas fa-map-marker-alt"></i> Shipping Address</h2>
                        <button onclick="toggleNewAddress()" id="toggleBtn" style="background:none; border:none; color:var(--secondary); font-weight:800; cursor:pointer;">+ Add New</button>
                    </div>

                    <!-- Saved Addresses Selector -->
                    <div id="savedAddressesList" style="display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 25px;">
                        <!-- Addresses populated here -->
                    </div>

                    <!-- New Address Form (Hidden by default if addresses exist) -->
                    <form id="addressForm" class="address-form" style="display: none; border-top: 1px dashed #eee; padding-top: 20px;">
                        <div class="form-group full">
                            <label>Full Name</label>
                            <input type="text" id="shipName" placeholder="Receiver's name" required>
                        </div>
                        <div class="form-group">
                            <label>Mobile No.</label>
                            <input type="text" id="shipMobile" placeholder="10-digit number" required>
                        </div>
                        <div class="form-group">
                            <label>Alternate No.</label>
                            <input type="text" id="shipAltMobile" placeholder="Alternative number">
                        </div>
                        <div class="form-group full">
                            <label>Locality / Address</label>
                            <textarea id="shipLocality" rows="3" placeholder="Flat No, Building, Street" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <select id="shipCity" style="width:100%; padding:12px; border:2px solid #f0f0f0; border-radius:10px; font-family:inherit;">
                                <option value="">Select City</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Pincode</label>
                            <input type="text" id="shipPincode" placeholder="302001" required>
                        </div>
                        <div class="form-group">
                            <label>State</label>
                            <select id="shipState" onchange="fetchCities(this.value)" style="width:100%; padding:12px; border:2px solid #f0f0f0; border-radius:10px; font-family:inherit;">
                                <option value="">Select State</option>
                            </select>
                        </div>
                    </form>
                </div>

                <!-- Payment Method -->
                <div class="section-card">
                    <h2><i class="fas fa-credit-card"></i> Payment Method</h2>
                    <div style="padding: 15px; border: 2px solid #4ecdc4; border-radius: 12px; background: #f0fffb; display: flex; align-items: center; gap: 15px;">
                        <input type="radio" checked>
                        <div style="font-weight: 700;">Cash on Delivery (COD)</div>
                        <div style="margin-left: auto; font-size: 12px; color: #666;">Pay when you receive the items</div>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <div class="summary-card">
                    <h3 style="font-weight: 900; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Order Summary</h3>
                    <div id="checkoutItems">
                        <!-- Items rendered here -->
                    </div>
                    
                    <div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #eee;">
                        <label style="font-size: 12px; font-weight: 700; color: #888; display: block; margin-bottom: 5px;">HAVE A COUPON?</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="couponInput" placeholder="Enter code" style="flex: 1; padding: 10px; border: 2px solid #f0f0f0; border-radius: 8px; font-family: inherit;">
                            <button onclick="applyCoupon()" style="background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 8px; font-weight: 700; cursor: pointer;">Apply</button>
                        </div>
                        <div id="couponMessage" style="font-size: 11px; margin-top: 5px; min-height: 15px;"></div>
                    </div>

                    <div id="discountRow" style="display: none; justify-content: space-between; margin-top: 15px; color: #27ae60; font-weight: 700; font-size: 14px;">
                        <span>Discount Applied:</span>
                        <span id="discountAmt">-₹0</span>
                    </div>

                    <div class="total-row">
                        <span>Total Amount:</span>
                        <span id="checkoutTotal">₹0</span>
                    </div>
                    <button class="place-order-btn" onclick="placeOrder()">Place Order <i class="fas fa-arrow-right"></i></button>
                    <p style="font-size: 11px; text-align: center; color: #999; margin-top: 15px;">By placing the order, you agree to our Terms and Conditions.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Unified Mobile Bottom Navigation -->
    <!-- ===== MOBILE BOTTOM NAVIGATION ===== -->
    <nav class="mobile-bottom-nav">
        <a href="index.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="categories.html"><i class="fas fa-th-large"></i><span>Categories</span></a>
        <a href="cart.html"><i class="fas fa-shopping-cart"></i><span>Cart</span><span id="cartCountMobileBottom" class="dot" style="display:none;"></span></a>
        <a href="profile.html"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script>
        const userId = localStorage.getItem('fc_user_id');
        if (!userId || userId.startsWith('GUEST_')) {
            alert('Please login to place an order.');
            window.location.href = 'login.html';
        }

        async function fetchStates() {
            const select = document.getElementById('shipState');
            if (select.options.length > 1) return;
            try {
                const res = await fetch('/api/states');
                const states = await res.json();
                if (Array.isArray(states)) {
                    select.innerHTML = '<option value="">Select State</option>' + 
                        states.map(s => `<option value="${s.state}">${s.state}</option>`).join('');
                }
            } catch (err) { console.error('States fail:', err); }
        }
        fetchStates();

        async function fetchCities(stateName) {
            const select = document.getElementById('shipCity');
            select.innerHTML = '<option value="">Loading...</option>';
            try {
                const res = await fetch(`/api/cities/${encodeURIComponent(stateName)}`);
                const cities = await res.json();
                if (Array.isArray(cities)) {
                    select.innerHTML = '<option value="">Select City</option>' + 
                        cities.map(c => `<option value="${c.city || c.city_name}">${c.city || c.city_name}</option>`).join('');
                } else {
                    select.innerHTML = '<option value="">Manual Entry Required</option>';
                }
            } catch (err) { select.innerHTML = '<option value="">Failed to load cities</option>'; }
        }

        let baseTotal = 0;
        let discount = 0;
        let appliedCoupon = null;
        let selectedAddressId = null;
        let savedAddresses = [];

        async function loadCheckoutData() {
            try {
                const res = await fetch(`/api/cart?userid=${userId}`);
                const data = await res.json();
                const items = (data.cartdata || []).filter(item => !item.error && (item.productId || item.productid || item.productName));
                
                if (items.length === 0) {
                    document.getElementById('checkoutItems').innerHTML = '<p style="color: #888;">Your cart is empty.</p>';
                } else {
                    document.getElementById('checkoutItems').innerHTML = items.map(item => `
                        <div class="item-row">
                            <span>${item.productName} x ${item.productQty}</span>
                            <span>₹${item.amount}</span>
                        </div>
                    `).join('');
                }
                
                baseTotal = parseFloat(data.totalAmt?.toString().replace(/&#\d+;/g, '').replace(/,/g, '').match(/[\d.]+/)?.[0] || 0);
                updateDisplayTotal();
                
                // Load saved addresses
                await loadSavedAddresses();
                
            } catch (err) { console.error(err); }
        }

        async function loadSavedAddresses() {
            const listEl = document.getElementById('savedAddressesList');
            try {
                const res = await fetch(`/api/addresses?userid=${userId}`);
                const data = await res.json();
                savedAddresses = (data.addressdata || []).filter(addr => addr.addressid);

                if (savedAddresses.length === 0) {
                    listEl.innerHTML = '<p style="color: #888; font-size: 14px;">No saved addresses found. Please add a new one.</p>';
                    showNewAddressForm(true);
                } else {
                    listEl.innerHTML = savedAddresses.map((addr, idx) => `
                        <div class="address-card ${idx === 0 ? 'selected' : ''}" 
                             onclick="selectAddress('${addr.addressid}')" 
                             id="addr-${addr.addressid}">
                            <div style="font-weight: 900; margin-bottom: 5px;">${addr.contact_name}</div>
                            <div style="font-size: 13px; color: #666; line-height: 1.4;">
                                ${addr.locality}, ${addr.city}, ${addr.pincode}<br>
                                Mobile: ${addr.contact_no}
                            </div>
                        </div>
                    `).join('');
                    
                    // Auto-select first address
                    selectedAddressId = savedAddresses[0].addressid;
                    showNewAddressForm(false);
                }
            } catch (err) {
                listEl.innerHTML = '<p style="color: #e74c3c;">Failed to load saved addresses.</p>';
            }
        }

        function selectAddress(id) {
            selectedAddressId = id;
            document.querySelectorAll('#savedAddressesList > .address-card').forEach(el => {
                el.classList.remove('selected');
            });
            
            const selectedEl = document.getElementById(`addr-${id}`);
            selectedEl.classList.add('selected');
            
            showNewAddressForm(false);
        }

        function toggleNewAddress() {
            const form = document.getElementById('addressForm');
            const btn = document.getElementById('toggleBtn');
            const isVisible = form.style.display === 'grid';
            
            showNewAddressForm(!isVisible);
        }

        function showNewAddressForm(show) {
            const form = document.getElementById('addressForm');
            const btn = document.getElementById('toggleBtn');
            if (show) {
                form.style.display = 'grid';
                btn.textContent = 'Cancel';
                selectedAddressId = null; // Unselect saved address
                document.querySelectorAll('#savedAddressesList > div').forEach(el => {
                    el.style.borderColor = '#f0f0f0';
                    const icon = el.querySelector('.fa-check-circle');
                    if (icon) icon.remove();
                });
            } else {
                form.style.display = 'none';
                btn.textContent = '+ Add New';
            }
        }

        function updateDisplayTotal() {
            const finalTotal = Math.max(0, baseTotal - discount);
            document.getElementById('checkoutTotal').textContent = `₹${finalTotal.toLocaleString('en-IN')}`;
            
            if (discount > 0) {
                document.getElementById('discountRow').style.display = 'flex';
                document.getElementById('discountAmt').textContent = `-₹${discount.toLocaleString('en-IN')}`;
            } else {
                document.getElementById('discountRow').style.display = 'none';
            }
        }

        async function applyCoupon() {
            const code = document.getElementById('couponInput').value.trim();
            const msgEl = document.getElementById('couponMessage');
            
            if (!code) return;
            
            msgEl.textContent = 'Verifying...';
            msgEl.style.color = '#888';

            try {
                const res = await fetch('/api/coupons/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, userId, totalAmount: baseTotal })
                });
                const result = await res.json();

                if (result.valid) {
                    if (result.type === 'percent') {
                        discount = (baseTotal * result.discount) / 100;
                    } else {
                        discount = result.discount;
                    }
                    appliedCoupon = code;
                    msgEl.textContent = result.message;
                    msgEl.style.color = '#27ae60';
                    updateDisplayTotal();
                } else {
                    discount = 0;
                    appliedCoupon = null;
                    msgEl.textContent = result.message;
                    msgEl.style.color = '#e74c3c';
                    updateDisplayTotal();
                }
            } catch (err) {
                msgEl.textContent = 'Service unavailable';
                msgEl.style.color = '#e74c3c';
            }
        }

        async function placeOrder() {
            const btn = document.querySelector('.place-order-btn');
            const originalHtml = btn.innerHTML;
            
            let addressIdToUse = selectedAddressId;

            // If no saved address selected, check form
            if (!addressIdToUse) {
                const locality = document.getElementById('shipLocality').value;
                const city = document.getElementById('shipCity').value;
                const pincode = document.getElementById('shipPincode').value;
                const name = document.getElementById('shipName').value;
                const mobile = document.getElementById('shipMobile').value;

                if (!locality || !city || !pincode || !name || !mobile) {
                    alert('Please select an address or fill the shipping details.');
                    return;
                }

                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving Address...';
                btn.disabled = true;

                try {
                    const addressData = {
                        userid: userId,
                        locality: locality,
                        city: city,
                        state: document.getElementById('shipState').value || 'Rajasthan',
                        pincode: pincode,
                        landmark: '',
                        contact_name: name,
                        contact_no: mobile,
                        alternate_no: document.getElementById('shipAltMobile').value,
                        addrs_type: 'Home',
                        reqtype: 'A'
                    };

                    const addrRes = await fetch('/api/address/manage', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(addressData)
                    });
                    
                    const addrResult = await addrRes.json();
                    
                    if (addrResult.addressid) {
                        addressIdToUse = addrResult.addressid;
                    } else {
                        // Fallback: poll one more time
                        const addressesRes = await fetch(`/api/addresses?userid=${userId}`);
                        const addressesData = await addressesRes.json();
                        if (addressesData.addressdata && addressesData.addressdata.length > 0) {
                            addressIdToUse = addressesData.addressdata[addressesData.addressdata.length - 1].addressid;
                        }
                    }
                } catch (err) {
                    alert('Failed to save new address.');
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                    return;
                }
            }

            if (!addressIdToUse) {
                alert('Shipping address is required.');
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Finalizing Order...';
            btn.disabled = true;

            try {
                const orderRes = await fetch('/api/order/place', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        addressId: addressIdToUse,
                        paymentMode: 'Cash on delivery',
                        coupon: appliedCoupon,
                        discount: discount
                    })
                });
                
                const orderResult = await orderRes.json();
                
                if (orderResult.po_no || orderResult.status === 'ok') {
                    alert(`Success! Your order #${orderResult.po_no || ''} has been placed.`);
                    window.location.href = 'index.html';
                } else {
                    throw new Error(orderResult.error || 'Backend failed to process order');
                }
            } catch (err) {
                console.error('Checkout error:', err);
                alert('Checkout failed: ' + err.message);
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        loadCheckoutData();
    </script>
</body>
</html>
