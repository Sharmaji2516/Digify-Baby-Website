<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FirstCry - Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
    <style>
        .auth-container { min-height: calc(100vh - 200px); display: flex; align-items: center; justify-content: center; padding: 40px 5%; background: #fdfdfd; }
        .auth-card { background: white; width: 100%; max-width: 450px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .auth-card h1 { font-size: 28px; font-weight: 900; margin-bottom: 10px; color: var(--text-dark); }
        .auth-card p { color: #888; margin-bottom: 30px; font-size: 14px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; color: #555; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #f0f0f0; border-radius: 10px; font-family: inherit; transition: var(--transition); }
        .auth-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 30px; font-size: 18px; font-weight: 800; cursor: pointer; transition: var(--transition); margin-top: 10px; }
        .status-msg { padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 700; margin-bottom: 20px; display: none; }
        .status-error { background: #fff5f5; color: #ff6b6b; border: 1px solid #ffe3e3; }
        .status-success { background: #f5fff9; color: #2ecc71; border: 1px solid #e3ffef; }
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo" style="text-decoration: none;">
            <span class="first">First</span><span class="cry">Cry</span>
        </a>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <div id="statusBox" class="status-msg"></div>

            <!-- Step 1: Request OTP -->
            <div id="step1" class="step active">
                <h1>Reset Password</h1>
                <p>Enter your registered email address to receive a verification code.</p>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="john@example.com">
                </div>
                <button class="auth-btn" id="reqBtn" onclick="requestResetOTP()">Request OTP</button>
            </div>

            <!-- Step 2: Verify OTP -->
            <div id="step2" class="step">
                <h1>Verify Code</h1>
                <p>We've sent a code to your email. Please enter it below.</p>
                <div class="form-group">
                    <label>6-Digit OTP</label>
                    <input type="text" id="otp" placeholder="000000" maxlength="6" style="text-align: center; font-size: 20px; letter-spacing: 4px;">
                </div>
                <button class="auth-btn" id="verifyBtn" onclick="verifyResetOTP()">Verify Code</button>
            </div>

            <!-- Step 3: New Password -->
            <div id="step3" class="step">
                <h1>New Password</h1>
                <p>Set a strong password to secure your account.</p>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Minimum 6 characters">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat new password">
                </div>
                <button class="auth-btn" id="resetBtn" onclick="submitNewPassword()">Update Password</button>
            </div>

            <div class="footer-links" style="margin-top:25px; font-size: 14px;">
                Remembered your password? <a href="login.html" style="color: var(--primary); font-weight: 700; text-decoration: none;">Login Now</a>
            </div>
        </div>
    </main>

    <script>
        let userEmail = '';

        function showStatus(msg, type = 'error') {
            const box = document.getElementById('statusBox');
            box.textContent = msg;
            box.className = `status-msg status-${type}`;
            box.style.display = 'block';
        }

        function showStep(s) {
            document.querySelectorAll('.step').forEach(st => st.classList.remove('active'));
            document.getElementById('step' + s).classList.add('active');
            document.getElementById('statusBox').style.display = 'none';
        }

        async function requestResetOTP() {
            userEmail = document.getElementById('email').value;
            if (!userEmail || !userEmail.includes('@')) {
                return showStatus('Please enter a valid email address');
            }

            const btn = document.getElementById('reqBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                const res = await fetch('/api/password/forgot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                const data = await res.json();
                
                // Backend returns [{response: "..."}} or [{error: "..."}]
                // Move to step 2 if NO error field, or if response looks positive
                const d = Array.isArray(data) ? data[0] : data;
                const hasError = d?.error || (d?.response && d.response.toLowerCase().includes('not found'));
                if (!hasError) {
                    showStatus('OTP sent to your email address!', 'success');
                    setTimeout(() => showStep(2), 1000);
                } else {
                    showStatus(d?.error || d?.response || 'Email not found. Please check and try again.');
                }
            } catch (err) {
                showStatus('Connection error. Please try later.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Request OTP';
            }
        }

        async function verifyResetOTP() {
            const otp = document.getElementById('otp').value;
            if (!otp) return showStatus('Please enter the OTP');

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

            try {
                const res = await fetch('/api/password/forgot-otp-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ otp, email: userEmail })
                });
                const data = await res.json();
                const d = Array.isArray(data) ? data[0] : data;
                
                // FIXED LOGIC: Prioritize success flag or positive message
                const isSuccess = d?.success === true || 
                                 (d?.message || '').toLowerCase().includes('verified') || 
                                 (d?.response || '').toLowerCase().includes('matched');

                if (isSuccess) {
                    showStatus('Code verified! Set your new password.', 'success');
                    setTimeout(() => showStep(3), 800);
                } else {
                    showStatus(d?.error || d?.response || 'Invalid OTP. Please try again.');
                }
            } catch (err) {
                showStatus('Verification failed.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Verify Code';
            }
        }

        async function submitNewPassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!newPassword) return showStatus('Please enter a new password');
            if (newPassword.length < 6) return showStatus('⚠️ Password must be at least 6 characters');
            if (newPassword !== confirm) return showStatus('Passwords do not match');

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

            try {
                const res = await fetch('/api/password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userid: userEmail, newPassword })
                });
                const data = await res.json();

                if (data[0]?.response && data[0].response.toLowerCase().includes('success')) {
                    showStatus('Password updated successfully! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'login.html', 3000);
                } else {
                    showStatus(data[0]?.response || 'Update failed.');
                }
            } catch (err) {
                showStatus('Update service unavailable.');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }
    </script>
</body>
</html>
